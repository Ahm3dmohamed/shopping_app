name: ecommerce_app
description: A new Flutter project.
publish_to: "none"
version: 0.1.0

environment:
  sdk: ">=3.3.4 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  auto_size_text: ^3.0.0
  bloc: 9.0.0
  cached_network_image: ^3.3.1
  carousel_slider_plus: ^7.1.0
  colornames: ^0.2.0
  connectivity_plus: ^6.1.4
  dartz: ^0.10.1
  dio: ^5.8.0+1
  equatable: ^2.0.7
  flutter_bloc: ^9.1.1
  flutter_native_splash: ^2.3.5
  flutter_screenutil: ^5.8.2
  flutter_slidable: ^3.1.0
  flutter_svg: ^2.0.10+1
  get_it: ^7.6.4
  injectable: ^2.3.2
  internet_connection_checker: ^1.0.0+1
  loader_overlay: ^4.0.4+1
  readmore: ^2.2.0
  shared_preferences: ^2.2.2
  smooth_page_indicator: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  injectable_generator: ^2.4.0
  build_runner: ^2.4.7

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/svg_images/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-.ttf
